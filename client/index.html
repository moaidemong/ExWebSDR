<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>ExWebSDR MVP</title>
  <style>
    html, body { margin: 0; height: 100%; background: #00040f; overflow: hidden; }
    canvas { width: 100%; height: 100%; image-rendering: pixelated; display: block; }
    .measure {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 15px;
      z-index: 24;
      pointer-events: none;
      background: rgba(6, 12, 30, 0.86);
    }
    .band-slider {
      position: fixed;
      left: 10px;
      bottom: 10px;
      width: min(420px, calc(100vw - 20px));
      z-index: 26;
      color: #deecff;
      background: rgba(6, 12, 30, 0.86);
      border: 1px solid #808080;
      border-radius: 10px;
      padding: 8px 10px;
      box-sizing: border-box;
      font: 12px/1.2 Consolas, "Courier New", monospace;
      user-select: none;
    }
    .band-title { opacity: 0.9; margin-bottom: 6px; }
    .band-track {
      position: relative;
      height: 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, #2f2f2f 0%, #575757 50%, #7a7a7a 100%);
      border: 1px solid #808080;
      cursor: pointer;
      overflow: hidden;
    }
    .band-knob {
      position: absolute;
      top: -5px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffffff, #a5c8ee 65%, #6d8db8 100%);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.5);
      transform: translateX(-50%);
      transition: left 140ms cubic-bezier(0.2, 0.85, 0.25, 1.0);
      cursor: grab;
    }
    .band-knob.dragging { transition: none; cursor: grabbing; }
    .band-label {
      margin-top: 6px;
      opacity: 0.95;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hover-tip {
      position: fixed;
      z-index: 22;
      pointer-events: none;
      color: #f3f8ff;
      background: rgba(8, 14, 28, 0.9);
      border: 1px solid rgba(170, 210, 255, 0.45);
      border-radius: 6px;
      padding: 4px 6px;
      font: 11px/1.2 Consolas, "Courier New", monospace;
      white-space: nowrap;
      transform: translate(10px, -14px);
    }
    .wave-panel {
      position: fixed;
      z-index: 23;
      pointer-events: none;
      width: 320px;
      height: 86px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
      padding: 6px 8px;
      box-sizing: border-box;
      color: #0a1120;
    }
    .wave-freq {
      font: 12px/1.2 Consolas, "Courier New", monospace;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .wave-canvas {
      width: 100%;
      height: 58px;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="wf" width="1920" height="900"></canvas>
  <canvas id="measure" class="measure" width="1920" height="15"></canvas>
  <div id="bandSlider" class="band-slider">
    <div class="band-title">All Bands (MW ~ 26100 kHz)</div>
    <div id="bandTrack" class="band-track">
      <div id="bandKnob" class="band-knob"></div>
    </div>
    <div id="bandLabel" class="band-label">-</div>
  </div>
  <div id="hoverTip" class="hover-tip" hidden></div>
  <div id="wavePanel" class="wave-panel" hidden>
    <div id="waveFreq" class="wave-freq">-</div>
    <canvas id="waveCanvas" class="wave-canvas" width="304" height="58"></canvas>
  </div>
  <script>
    const HEADER = 14;
    const ALL_BAND_MIN_HZ = 530_000;
    const ALL_BAND_MAX_HZ = 26_100_000;
    const DEFAULT_SPAN_HZ = 2_400_000;
    const SLIDER_STEP_HZ = 100_000;
    const RETUNE_SUPPRESS_MS = 420;

    const canvas = document.getElementById("wf");
    const ctx = canvas.getContext("2d");
    const measureCanvas = document.getElementById("measure");
    const measureCtx = measureCanvas.getContext("2d");

    const hoverTipEl = document.getElementById("hoverTip");
    const wavePanelEl = document.getElementById("wavePanel");
    const waveFreqEl = document.getElementById("waveFreq");
    const waveCanvasEl = document.getElementById("waveCanvas");
    const waveCtx = waveCanvasEl.getContext("2d");

    const bandTrackEl = document.getElementById("bandTrack");
    const bandKnobEl = document.getElementById("bandKnob");
    const bandLabelEl = document.getElementById("bandLabel");

    let emaLow = 66;
    let emaHigh = 240;
    let frameBins = 0;
    let displayBins = 0;
    let lastRow = null;
    let peakBinMap = new Int32Array(1024);

    let hoverState = {
      inside: false,
      strong: false,
      lastMoveTs: 0,
      x: 0,
      y: 0,
      peakBin: -1,
      freqHz: null,
      strength: 0,
    };

    let waveVisible = false;
    let lastHoverSendTs = 0;
    let lastViewSendTs = 0;
    let latestAMWave = null;
    let latestAMWaveTs = 0;
    let suppressFramesUntil = 0;

    let rowImage = ctx.createImageData(1024, 1);
    let currentMeta = {
      band_name: "-",
      center_freq_hz: null,
      sample_rate_hz: null,
      next_change_epoch_sec: null,
    };

    let currentViewStartHz = null;
    let currentViewCenterHz = null;
    let currentViewSpanHz = DEFAULT_SPAN_HZ;
    let tuneInitialized = false;

    const sliderState = {
      stepHz: SLIDER_STEP_HZ,
      steps: 1,
      index: 0,
      dragging: false,
      lastPointerX: 0,
    };

    const params = new URLSearchParams(location.search);
    if (params.has("center")) currentMeta.center_freq_hz = Number(params.get("center"));
    if (params.has("span")) currentMeta.sample_rate_hz = Number(params.get("span"));

    const pal = new Uint8Array(256 * 3);
    function lerp(a, b, t) { return a + (b - a) * t; }
    function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }

    function currentSpanHz() {
      const sr = Number(currentMeta.sample_rate_hz);
      if (Number.isFinite(sr) && sr > 10_000) return sr;
      return DEFAULT_SPAN_HZ;
    }

    function buildClassicPalette() {
      const stops = [
        [0.00, [0, 0, 4]],
        [0.20, [0, 0, 28]],
        [0.45, [0, 25, 120]],
        [0.68, [0, 120, 255]],
        [0.82, [255, 210, 70]],
        [0.92, [255, 120, 40]],
        [1.00, [255, 255, 255]],
      ];
      for (let i = 0; i < 256; i++) {
        const t = i / 255;
        let a = stops[0];
        let b = stops[stops.length - 1];
        for (let j = 0; j < stops.length - 1; j++) {
          if (t >= stops[j][0] && t <= stops[j + 1][0]) {
            a = stops[j];
            b = stops[j + 1];
            break;
          }
        }
        const localT = (t - a[0]) / (b[0] - a[0] || 1);
        pal[i * 3 + 0] = Math.round(lerp(a[1][0], b[1][0], localT));
        pal[i * 3 + 1] = Math.round(lerp(a[1][1], b[1][1], localT));
        pal[i * 3 + 2] = Math.round(lerp(a[1][2], b[1][2], localT));
      }
    }

    function computeSliderSteps(spanHz) {
      const usable = Math.max(0, (ALL_BAND_MAX_HZ - ALL_BAND_MIN_HZ) - spanHz);
      return Math.max(1, Math.floor(usable / sliderState.stepHz) + 1);
    }

    function viewStartFromIndex(index) {
      return ALL_BAND_MIN_HZ + index * sliderState.stepHz;
    }

    function setViewIndex(index, reason, edgeDirection = 0) {
      const maxIndex = sliderState.steps - 1;
      let next = clamp(Math.round(index), 0, maxIndex);
      if (maxIndex >= 1) {
        if (sliderState.index === 0 && next === 0 && edgeDirection < 0) next = 1;
        if (sliderState.index === maxIndex && next === maxIndex && edgeDirection > 0) next = maxIndex - 1;
      }
      if (next === sliderState.index && reason !== "init") {
        updateSliderVisual();
        return;
      }
      sliderState.index = next;
      currentViewSpanHz = currentSpanHz();
      currentViewStartHz = viewStartFromIndex(sliderState.index);
      currentViewCenterHz = currentViewStartHz + currentViewSpanHz / 2;
      tuneInitialized = true;
      updateSliderVisual();
      drawMeasure();
      clearWaterfall();
      suppressFramesUntil = performance.now() + RETUNE_SUPPRESS_MS;
      sendViewControl(reason === "init");
    }

    function syncSliderToView(centerHz) {
      currentViewSpanHz = currentSpanHz();
      sliderState.steps = computeSliderSteps(currentViewSpanHz);
      const maxStart = viewStartFromIndex(sliderState.steps - 1);
      const desiredStart = clamp(centerHz - currentViewSpanHz / 2, ALL_BAND_MIN_HZ, maxStart);
      const idx = Math.round((desiredStart - ALL_BAND_MIN_HZ) / sliderState.stepHz);
      sliderState.index = clamp(idx, 0, sliderState.steps - 1);
      currentViewStartHz = viewStartFromIndex(sliderState.index);
      currentViewCenterHz = currentViewStartHz + currentViewSpanHz / 2;
      updateSliderVisual();
      drawMeasure();
    }

    function fmtMHz(v) {
      if (!Number.isFinite(v) || v <= 0) return "-";
      return (v / 1_000_000).toFixed(3) + " MHz";
    }

    function fmtHz(v) {
      if (!Number.isFinite(v) || v <= 0) return "-";
      const khz = Math.floor(v / 1000);
      return `${khz}KHz`;
    }

    function updateSliderVisual() {
      const max = Math.max(1, sliderState.steps - 1);
      const ratio = sliderState.index / max;
      bandKnobEl.style.left = `${(ratio * 100).toFixed(4)}%`;
      const span = currentViewSpanHz || currentSpanHz();
      const start = viewStartFromIndex(sliderState.index);
      const end = start + span;
      bandLabelEl.textContent = `${Math.round(start / 1000)} kHz ~ ${Math.round(end / 1000)} kHz  (${sliderState.index + 1}/${sliderState.steps})`;
    }

    function drawMeasure() {
      const dpr = window.devicePixelRatio || 1;
      const cssW = Math.max(320, window.innerWidth);
      const cssH = measureCanvas.clientHeight || 15;
      measureCanvas.width = Math.floor(cssW * dpr);
      measureCanvas.height = Math.floor(cssH * dpr);
      const w = measureCanvas.width;
      const h = measureCanvas.height;
      measureCtx.setTransform(1, 0, 0, 1, 0, 0);
      measureCtx.clearRect(0, 0, w, h);
      measureCtx.fillStyle = "rgba(6, 12, 30, 0.86)";
      measureCtx.fillRect(0, 0, w, h);
      measureCtx.strokeStyle = "#808080";
      measureCtx.lineWidth = Math.max(1, Math.floor(dpr));
      measureCtx.beginPath();
      measureCtx.moveTo(0, h - 0.5);
      measureCtx.lineTo(w, h - 0.5);
      measureCtx.stroke();

      const span = currentViewSpanHz || currentSpanHz();
      const start = Number.isFinite(currentViewStartHz) ? currentViewStartHz : ALL_BAND_MIN_HZ;
      const end = start + span;
      const minK = Math.floor(start / 100_000) * 100;
      const maxK = Math.ceil(end / 100_000) * 100;

      measureCtx.font = `${Math.max(10, Math.round(10 * dpr))}px Consolas`;
      measureCtx.fillStyle = "rgba(200, 228, 255, 0.92)";
      measureCtx.strokeStyle = "#808080";
      measureCtx.textBaseline = "bottom";

      for (let k = minK; k <= maxK; k += 100) {
        const hz = k * 1000;
        const t = (hz - start) / span;
        if (t < -0.001 || t > 1.001) continue;
        const x = Math.round(t * w);
        const major = (k % 1000) === 0;
        const tickTop = major ? Math.round(h * 0.12) : Math.round(h * 0.35);
        measureCtx.beginPath();
        measureCtx.moveTo(x + 0.5, tickTop);
        measureCtx.lineTo(x + 0.5, h - 1);
        measureCtx.stroke();
        if (major) {
          measureCtx.fillText(`${k} KHz`, x + 3, h - 1);
        }
      }
    }

    function resizeCanvas() {
      canvas.width = Math.max(1024, window.innerWidth);
      canvas.height = Math.max(500, window.innerHeight);
      displayBins = canvas.width;
      rowImage = ctx.createImageData(displayBins, 1);
      peakBinMap = new Int32Array(displayBins);
      sliderState.steps = computeSliderSteps(currentSpanHz());
      sliderState.index = clamp(sliderState.index, 0, sliderState.steps - 1);
      currentViewSpanHz = currentSpanHz();
      currentViewStartHz = viewStartFromIndex(sliderState.index);
      currentViewCenterHz = currentViewStartHz + currentViewSpanHz / 2;
      updateSliderVisual();
      drawMeasure();
    }

    function clearWaterfall() {
      lastRow = null;
      ctx.fillStyle = "#00040f";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    buildClassicPalette();
    resizeCanvas();
    clearWaterfall();
    window.addEventListener("resize", resizeCanvas);


    function estimateLevels(row) {
      const stride = Math.max(1, Math.floor(row.length / 2048));
      const sampled = [];
      for (let i = 0; i < row.length; i += stride) sampled.push(row[i]);
      const sorted = sampled.sort((a, b) => a - b);
      const p30 = sorted[Math.floor(sorted.length * 0.30)];
      const p998 = sorted[Math.floor(sorted.length * 0.998)];
      return [p30, p998];
    }

    function bucketPeakInfo(row, x, outBins) {
      const start = Math.floor(x * row.length / outBins);
      const end = Math.max(start + 1, Math.floor((x + 1) * row.length / outBins));
      let peakVal = row[start];
      let peakBin = start;
      for (let i = start + 1; i < end; i++) {
        if (row[i] > peakVal) {
          peakVal = row[i];
          peakBin = i;
        }
      }
      return { peakVal, peakBin };
    }

    function drawRow(row) {
      lastRow = row;
      if (frameBins !== row.length) frameBins = row.length;
      const [low, high] = estimateLevels(row);
      emaLow = emaLow * 0.96 + low * 0.04;
      emaHigh = emaHigh * 0.96 + high * 0.04;
      const range = Math.max(34, emaHigh - emaLow);
      const top = measureCanvas.clientHeight || 15;

      ctx.drawImage(canvas, 0, top, canvas.width, canvas.height - top - 1, 0, top + 1, canvas.width, canvas.height - top - 1);
      const d = rowImage.data;
      for (let x = 0; x < displayBins; x++) {
        const info = bucketPeakInfo(row, x, displayBins);
        const src = info.peakVal;
        peakBinMap[x] = info.peakBin;
        const normalized = (src - (emaLow + 6)) / range;
        const mapped = Math.max(0, Math.min(1, normalized));
        let tone = Math.pow(mapped, 1.65);
        tone += Math.pow(mapped, 7.0) * 0.20;
        if (tone < 0.008) tone = 0;
        const v = Math.round(Math.min(1, tone) * 255);
        const p = x * 4;
        d[p] = pal[v * 3];
        d[p + 1] = pal[v * 3 + 1];
        d[p + 2] = pal[v * 3 + 2];
        d[p + 3] = 255;
      }
      ctx.putImageData(rowImage, 0, top);
    }

    function showHoverTip(clientX, clientY, text) {
      hoverTipEl.textContent = text;
      hoverTipEl.style.left = `${clientX}px`;
      hoverTipEl.style.top = `${clientY}px`;
      hoverTipEl.hidden = false;
    }

    function hideHoverTip() {
      hoverTipEl.hidden = true;
    }

    function positionWavePanel(clientX, clientY) {
      const pad = 12;
      const w = wavePanelEl.offsetWidth || 320;
      const h = wavePanelEl.offsetHeight || 86;
      let x = clientX + 16;
      let y = clientY + 16;
      if (x + w > window.innerWidth - pad) x = clientX - w - 16;
      if (y + h > window.innerHeight - pad) y = clientY - h - 16;
      if (x < pad) x = pad;
      if (y < pad) y = pad;
      wavePanelEl.style.left = `${x}px`;
      wavePanelEl.style.top = `${y}px`;
    }

    function drawWave(freqHz, strength) {
      const w = waveCanvasEl.width;
      const h = waveCanvasEl.height;
      waveCtx.clearRect(0, 0, w, h);
      waveCtx.fillStyle = "rgba(255,255,255,0.20)";
      waveCtx.fillRect(0, 0, w, h);
      waveCtx.strokeStyle = "rgba(255,255,255,0.95)";
      waveCtx.lineWidth = 1.6;
      const mid = h * 0.5;
      const amp = 8 + Math.min(1, Math.max(0, strength)) * 16;
      waveCtx.beginPath();
      if (latestAMWave && Array.isArray(latestAMWave.samples) && latestAMWave.samples.length > 0) {
        const s = latestAMWave.samples;
        for (let x = 0; x < w; x++) {
          const idx = Math.min(s.length - 1, Math.floor((x / (w - 1)) * s.length));
          const y = mid + (s[idx] * amp);
          if (x === 0) waveCtx.moveTo(x, y);
          else waveCtx.lineTo(x, y);
        }
      } else {
        const cycles = 2.2 + ((Math.floor(freqHz / 1000) % 6) * 0.55);
        const phase = performance.now() * 0.006;
        for (let x = 0; x < w; x++) {
          const t = x / (w - 1);
          const y = mid + Math.sin((Math.PI * 2 * cycles * t) + phase) * amp;
          if (x === 0) waveCtx.moveTo(x, y);
          else waveCtx.lineTo(x, y);
        }
      }
      waveCtx.stroke();
    }

    function showWavePanel(clientX, clientY, freqHz, strength) {
      waveFreqEl.textContent = fmtHz(freqHz);
      positionWavePanel(clientX, clientY);
      drawWave(freqHz, strength);
      wavePanelEl.hidden = false;
      waveVisible = true;
    }

    function hideWavePanel() {
      wavePanelEl.hidden = true;
      waveVisible = false;
    }

    function estimateFreqFromBin(bin) {
      const cf = Number(currentViewCenterHz);
      const sr = Number(currentViewSpanHz || currentSpanHz());
      if (!Number.isFinite(cf) || !Number.isFinite(sr) || cf <= 0 || sr <= 0 || frameBins <= 0) {
        return null;
      }
      const hzPerBin = sr / frameBins;
      return cf - sr / 2 + (bin + 0.5) * hzPerBin;
    }

    function sendHoverControl(force = false) {
      if (
        !hoverState.inside ||
        !hoverState.strong ||
        !Number.isFinite(hoverState.freqHz) ||
        ws.readyState !== WebSocket.OPEN
      ) {
        return;
      }
      const now = performance.now();
      if (!force && now - lastHoverSendTs < 120) return;
      ws.send(JSON.stringify({
        type: "hover",
        mode: "am",
        freq_hz: Math.round(hoverState.freqHz),
        strength: hoverState.strength,
      }));
      lastHoverSendTs = now;
    }

    function sendViewControl(force = false) {
      if (!Number.isFinite(currentViewCenterHz) || ws.readyState !== WebSocket.OPEN) return;
      const now = performance.now();
      if (!force && now - lastViewSendTs < 70) return;
      ws.send(JSON.stringify({
        type: "view_window",
        center_freq_hz: Math.round(currentViewCenterHz),
        sample_rate_hz: Math.round(currentViewSpanHz || currentSpanHz()),
      }));
      lastViewSendTs = now;
    }

    function indexFromClientX(clientX) {
      const rect = bandTrackEl.getBoundingClientRect();
      const ratio = clamp((clientX - rect.left) / Math.max(1, rect.width), 0, 1);
      return Math.round(ratio * Math.max(1, sliderState.steps - 1));
    }

    function handleTrackPress(ev) {
      ev.preventDefault();
      sliderState.dragging = true;
      sliderState.lastPointerX = ev.clientX;
      bandKnobEl.classList.add("dragging");
      if (bandTrackEl.setPointerCapture) bandTrackEl.setPointerCapture(ev.pointerId);

      const knobRect = bandKnobEl.getBoundingClientRect();
      const knobCenter = knobRect.left + knobRect.width * 0.5;
      const clickDelta = ev.clientX - knobCenter;
      let edgeDirection = 0;
      if (clickDelta < 0) edgeDirection = -1;
      if (clickDelta > 0) edgeDirection = 1;
      setViewIndex(indexFromClientX(ev.clientX), "click", edgeDirection);
    }

    bandTrackEl.addEventListener("pointerdown", handleTrackPress);
    bandTrackEl.addEventListener("pointermove", (ev) => {
      if (!sliderState.dragging) return;
      const delta = ev.clientX - sliderState.lastPointerX;
      sliderState.lastPointerX = ev.clientX;
      let edgeDirection = 0;
      if (delta < -0.4) edgeDirection = -1;
      if (delta > 0.4) edgeDirection = 1;
      setViewIndex(indexFromClientX(ev.clientX), "drag", edgeDirection);
    });

    function stopDrag(ev) {
      if (!sliderState.dragging) return;
      sliderState.dragging = false;
      bandKnobEl.classList.remove("dragging");
      if (bandTrackEl.releasePointerCapture) {
        try { bandTrackEl.releasePointerCapture(ev.pointerId); } catch (_e) {}
      }
    }

    bandTrackEl.addEventListener("pointerup", stopDrag);
    bandTrackEl.addEventListener("pointercancel", stopDrag);
    bandTrackEl.addEventListener("pointerleave", (ev) => {
      if (sliderState.dragging && (ev.buttons & 1) === 0) stopDrag(ev);
    });

    canvas.addEventListener("mouseleave", () => {
      hoverState.inside = false;
      hideHoverTip();
      hideWavePanel();
    });

    canvas.addEventListener("mousemove", (ev) => {
      if (!lastRow || frameBins <= 0 || displayBins <= 0) {
        hoverState.strong = false;
        hideHoverTip();
        hideWavePanel();
        return;
      }
      const rect = canvas.getBoundingClientRect();
      const xCss = ev.clientX - rect.left;
      if (xCss < 0 || xCss >= rect.width) {
        hoverState.strong = false;
        hideHoverTip();
        hideWavePanel();
        return;
      }
      const xDisplay = Math.max(0, Math.min(displayBins - 1, Math.floor((xCss / rect.width) * displayBins)));
      let peakBin = peakBinMap[xDisplay];
      if (!Number.isFinite(peakBin) || peakBin < 0 || peakBin >= frameBins) {
        peakBin = Math.floor((xCss / rect.width) * frameBins);
      }
      const peakVal = lastRow[peakBin];
      const range = Math.max(34, emaHigh - emaLow);
      const strength = (peakVal - (emaLow + 6)) / range;
      if (strength < 0.14) {
        hoverState.strong = false;
        hideHoverTip();
        hideWavePanel();
        return;
      }
      const freq = estimateFreqFromBin(peakBin);
      if (!Number.isFinite(freq)) {
        hoverState.strong = false;
        hideHoverTip();
        hideWavePanel();
        return;
      }
      hoverState.inside = true;
      hoverState.strong = true;
      hoverState.lastMoveTs = performance.now();
      hoverState.x = ev.clientX;
      hoverState.y = ev.clientY;
      hoverState.peakBin = peakBin;
      hoverState.freqHz = freq;
      hoverState.strength = strength;
      showHoverTip(ev.clientX, ev.clientY, fmtHz(freq));
      if (waveVisible) {
        positionWavePanel(ev.clientX, ev.clientY);
        drawWave(freq, strength);
      }
      sendHoverControl();
    });

    function hoverTick() {
      if (hoverState.inside && hoverState.strong && lastRow && hoverState.peakBin >= 0 && hoverState.peakBin < lastRow.length) {
        const range = Math.max(34, emaHigh - emaLow);
        const strengthNow = (lastRow[hoverState.peakBin] - (emaLow + 6)) / range;
        if (strengthNow < 0.12) {
          hoverState.strong = false;
          hideWavePanel();
        } else {
          hoverState.strength = strengthNow;
        }
      }
      if (
        hoverState.inside &&
        hoverState.strong &&
        performance.now() - hoverState.lastMoveTs >= 3000 &&
        Number.isFinite(hoverState.freqHz)
      ) {
        showWavePanel(hoverState.x, hoverState.y, hoverState.freqHz, hoverState.strength);
      }
      requestAnimationFrame(hoverTick);
    }
    requestAnimationFrame(hoverTick);

    function parseFrame(buf) {
      const view = new DataView(buf);
      if (view.byteLength < HEADER) return null;
      const seq = view.getUint32(0, true);
      const tCapture = view.getFloat64(4, true);
      const n = view.getUint16(12, true);
      if (n <= 0) return null;
      if (view.byteLength !== HEADER + n) return null;
      const row = new Uint8Array(buf, HEADER, n);
      return { seq, tCapture, row };
    }

    const ws = new WebSocket(`ws://${location.hostname || "127.0.0.1"}:8764`);
    ws.binaryType = "arraybuffer";
    ws.onopen = () => {
      sendViewControl(true);
    };
    ws.onclose = () => {};
    ws.onmessage = (ev) => {
      if (typeof ev.data === "string") {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === "meta") {
            currentMeta = msg;
            if (!tuneInitialized && Number.isFinite(msg.center_freq_hz) && Number.isFinite(msg.sample_rate_hz)) {
              currentViewSpanHz = currentSpanHz();
              syncSliderToView(Number(msg.center_freq_hz));
              sendViewControl(true);
            } else {
              currentViewSpanHz = currentSpanHz();
              sliderState.steps = computeSliderSteps(currentViewSpanHz);
              sliderState.index = clamp(sliderState.index, 0, sliderState.steps - 1);
              currentViewStartHz = viewStartFromIndex(sliderState.index);
              currentViewCenterHz = currentViewStartHz + currentViewSpanHz / 2;
              updateSliderVisual();
              drawMeasure();
            }
          } else if (msg.type === "am_wave") {
            latestAMWave = msg;
            latestAMWaveTs = performance.now();
            if (waveVisible && Number.isFinite(hoverState.freqHz)) {
              drawWave(hoverState.freqHz, hoverState.strength);
            }
          }
        } catch (_e) {}
        return;
      }
      const frame = parseFrame(ev.data);
      if (!frame) return;
      if (performance.now() < suppressFramesUntil) return;
      drawRow(frame.row);
    };

    setInterval(() => {
      if (latestAMWave && performance.now() - latestAMWaveTs > 1200) {
        latestAMWave = null;
      }
    }, 300);

    setInterval(() => {
      sendHoverControl(true);
    }, 500);

    setInterval(() => {
      sendViewControl(true);
    }, 900);

    // Initial slider placement before metadata arrives.
    sliderState.steps = computeSliderSteps(currentSpanHz());
    setViewIndex(Math.floor(sliderState.steps * 0.5), "init");
  </script>
</body>
</html>
